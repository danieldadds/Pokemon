<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Pokemon</title>
    
  </head>
  <body>
    <button id="startgame">Start Battle</button>

    <div class="gamescreen">
      <div class="gametop">
        <h3 id="opponenthp"></h3>
        <h3 id="opponentname">NULL</h3>
        <p id="opstatus" class="status"></p>
      </div>
      <div class="gamemain">

        <h2 id="playertext"></h2>
        <div class="playerpokemon"></div>
        

      </div>
      <div class="gamebottom">
        <button id="button1"></button>
        <button id="button2"></button>
        <h3 id="playerHP"></h3>
        <p id="playerstatus" class="status"></p>
      </div>

    </div>

    <button id="pokemon1"></button>
    <button id="pokemon2"></button>

    

   
  


    <script src="game.js"></script>


  </body>
</html>
